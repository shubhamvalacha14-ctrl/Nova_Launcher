name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK for all
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/actions-setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :ZalithLauncher:assembleDebug

      - name: Upload Debug APK for all
        uses: actions/upload-artifact@v4
        with:
          name: NovaLauncher-Debug
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
          
