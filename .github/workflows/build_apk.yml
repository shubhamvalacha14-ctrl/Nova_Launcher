name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK for all
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # 🛠️ This step automatically generates a default Android debug signing key on the server
      - name: Setup Default Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -keypass android -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK
        run: ./gradlew :ZalithLauncher:assembleDebug

      - name: Upload Debug APK for all
        uses: actions/upload-artifact@v4
        with:
          name: NovaLauncher-Debug
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
          
