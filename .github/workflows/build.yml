name: Build Nova Launcher APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Configure Execution Permissions
        run: chmod +x ./gradlew

      - name: Configure Android Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -keypass android -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Compile and Build APK
        run: ./gradlew clean :ZalithLauncher:assembleDebug --no-daemon

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nova Launcher Debug APK
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
          
